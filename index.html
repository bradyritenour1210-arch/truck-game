
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Truck Driving Demo</title>
<style>
body{margin:0;overflow:hidden;background:black}
#hud{position:absolute;left:10px;top:10px;color:white;
background:rgba(0,0,0,.5);padding:10px;font-family:Arial}
</style>
</head>
<body>
<div id="hud">Truck Demo - WASD to drive</div>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import {OBJLoader} from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/OBJLoader.js";
import {MTLLoader} from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/MTLLoader.js";

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87ceeb);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,.1,5000);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xffffff,0x444444,2));

const sun=new THREE.DirectionalLight(0xffffff,2);
sun.position.set(100,150,50);
scene.add(sun);

const ground=new THREE.Mesh(
 new THREE.PlaneGeometry(4000,4000),
 new THREE.MeshStandardMaterial({color:0x4d8a43})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

const road=new THREE.Mesh(
 new THREE.PlaneGeometry(80,4000),
 new THREE.MeshStandardMaterial({color:0x333333})
);
road.rotation.x=-Math.PI/2;
road.position.y=.02;
scene.add(road);

let truck=new THREE.Group();
scene.add(truck);

const mtlLoader=new MTLLoader();
mtlLoader.load("obj.mtl",(materials)=>{
 materials.preload();
 const objLoader=new OBJLoader();
 objLoader.setMaterials(materials);
 objLoader.load("tinker.obj",(obj)=>{
   obj.scale.set(.05,.05,.05);
   truck.add(obj);
 });
});

const keys={};
onkeydown=e=>keys[e.key.toLowerCase()]=true;
onkeyup=e=>keys[e.key.toLowerCase()]=false;

let speed=0;

function animate(){
 requestAnimationFrame(animate);

 if(keys.w) speed+=0.01;
 if(keys.s) speed-=0.01;
 speed*=0.985;

 if(keys.a) truck.rotation.y+=0.03;
 if(keys.d) truck.rotation.y-=0.03;

 truck.position.x-=Math.sin(truck.rotation.y)*speed;
 truck.position.z-=Math.cos(truck.rotation.y)*speed;

 camera.position.lerp(
   new THREE.Vector3(
     truck.position.x,
     truck.position.y+10,
     truck.position.z+20
   ),0.05);

 camera.lookAt(truck.position);

 renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
